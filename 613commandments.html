    font-family: 'Lora', Georgia, serif;
    font-size: 0.95rem;
    cursor: pointer;

    display: flex;
    gap: 20px;
    align-items: center;
    margin-top: 12px;
    flex-wrap: wrap;
    font-family: 'Lora', Georgia, serif;
    font-size: 0.88rem;
    color: var(--ink-light);
  }

  /* ── Status bar ── */
  .result-status {
    margin: 16px 0 8px;
    font-family: 'Lora', Georgia, serif;
    font-size: 0.9rem;
    color: var(--gold);
    font-style: italic;
    min-height: 1.4em;
  }

  /* ── Results list ── */
  .result-item {
    border-left: 3px solid var(--scripture-blue);
    background: var(--scripture-bg);
    margin: 8px 0;
    padding: 12px 18px;
    animation: fadeIn 0.12s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; } }

  .result-number {
    font-family: 'Lora', Georgia, serif;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .result-text {
    font-family: 'Lora', Georgia, serif;
    color: var(--scripture-blue);
    font-size: 1rem;
    line-height: 1.6;
  }

  .result-ref {
    font-family: 'Lora', Georgia, serif;
    font-size: 0.85rem;
    color: var(--ink-light);
    margin-top: 4px;
    font-style: italic;
  }

  .result-text mark {
    background: #ffe48a;
    color: var(--ink);
    padding: 0 2px;
    border-radius: 2px;
  }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 20px 0 10px;
  }
  .page-btn {
    padding: 6px 14px;

    background: var(--ink);
    color: var(--gold-light);

  .state-msg {
    font-family: 'Lora', Georgia, serif;
    font-style: italic;
    color: var(--ink-light);
    padding: 24px 0;

  // ── State ───────────────────────────────────────────────────
  let currentMatches = [];
  let currentRegex = null;

  // ── Helpers ─────────────────────────────────────────────────
  function buildRegex(term, wholeWord, caseSensitive) {
    let escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    if (wholeWord) escaped = `\\b${escaped}\\b`;
    return new RegExp(escaped, caseSensitive ? 'g' : 'gi');
  }

  function highlight(text, regex) {
    if (!regex) return text;
    return text.replace(regex, m => `<mark>${m}</mark>`);
  }

  // ── Render ──────────────────────────────────────────────────
  function render(matches, regex) {
    const resultsEl = document.getElementById('results');
    const statusEl  = document.getElementById('status');
    resultsEl.innerHTML = '';

    if (matches.length === 0) {
      statusEl.textContent = 'No commands matched your search.';
      resultsEl.innerHTML = '<div class="state-msg">Try different words or click Show All.</div>';
      return;
    }

    const total = matches.length;
    const showing = total === 613 ? `Showing all 613 commands` : `${total} command${total !== 1 ? 's' : ''} found`;
    statusEl.textContent = showing;

    matches.forEach(cmd => {
      const div = document.createElement('div');
      div.className = 'result-item';
      div.innerHTML = `
        <div class="result-number">Command ${cmd.num}</div>
        <div class="result-text">${highlight(cmd.text, regex)}</div>
        <div class="result-ref">(${cmd.ref})</div>`;
      resultsEl.appendChild(div);
    });
  }

  // ── Search ──────────────────────────────────────────────────
  function doSearch() {
    const term          = document.getElementById('searchInput').value.trim();
    const wholeWord     = document.getElementById('wholeWord').checked;
    const caseSensitive = document.getElementById('caseSensitive').checked;

    if (!term) { showAll(); return; }

    let regex;
    try { regex = buildRegex(term, wholeWord, caseSensitive); }
    catch(e) { document.getElementById('status').textContent = 'Invalid search term.'; return; }

    currentRegex   = regex;
    currentMatches = COMMANDS.filter(cmd => { regex.lastIndex = 0; return regex.test(cmd.text); });
    render(currentMatches, currentRegex);
  }

  function showAll() {
    document.getElementById('searchInput').value = '';
    currentRegex   = null;
    currentMatches = COMMANDS.slice();
    render(currentMatches, currentRegex);
  }

  // ── Events ──────────────────────────────────────────────────
  document.getElementById('searchBtn').addEventListener('click', doSearch);
  document.getElementById('clearBtn').addEventListener('click', showAll);
  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  // Show all on load
  showAll();

})();
